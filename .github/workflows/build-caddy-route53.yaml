name: Build and Push Caddy-Technitium

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: CADDY
    steps:
      - name: Checkout
        uses: actions/checkout@v6 # Latest major version

      - name: Log in to Docker Hub
        uses: docker/login-action@v4 # Latest major version
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4 # Latest major version

      - name: Build and push
        uses: docker/build-push-action@v7 # Latest major version
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/caddy-route53:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
